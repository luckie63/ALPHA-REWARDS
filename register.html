<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Alpha Rewards</title>

<style>
body{
font-family:Arial,sans-serif;
background:#eef3ff;
margin:0;
}

header{
background:#0047AB;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:400px;
margin:40px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#0047AB;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#003080;
}

p{
text-align:center;
}

a{
color:#0047AB;
text-decoration:none;
}
</style>

</head>
<body>

<header>
💎 Alpha Rewards
</header>

<div class="container">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="tel" placeholder="Phone Number">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<input type="text" placeholder="Referral Code (Optional)">

<button>Create Account</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</body>
</html>
